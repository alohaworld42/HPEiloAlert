services:
  ilo-fan-alert:
    build: .
    container_name: ilo-fan-alert
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8181:8080"   # Dashboard → http://localhost:8181
    depends_on:
      - postfix
    networks:
      - alertnet

    # Optional: persist logs to host
    # volumes:
    #   - ./logs:/app/logs

  postfix:
    image: boky/postfix:latest
    container_name: postfix
    restart: unless-stopped
    environment:
      - ALLOWED_SENDER_DOMAINS=${MAIL_DOMAIN:-localhost}
      - HOSTNAME=${MAIL_DOMAIN:-localhost}
    networks:
      - alertnet

networks:
  alertnet:
